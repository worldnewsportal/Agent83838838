name: 🤖 Gemma 4 AI Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      task:
        description: "Task for the agent"
        required: true
        type: string
      target_branch:
        description: "Target branch"
        required: false
        default: "main"

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  # ─────────────────────────────────────────────
  # TRIGGER DETECTION
  # ─────────────────────────────────────────────
  detect-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      task: ${{ steps.check.outputs.task }}
      issue_number: ${{ steps.check.outputs.issue_number }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      trigger_type: ${{ steps.check.outputs.trigger_type }}
    steps:
      - name: 🔍 Detect trigger
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { eventName, payload } = context;
            let should_run = false;
            let task = "";
            let issue_number = "";
            let pr_number = "";
            let trigger_type = "";

            if (eventName === "issue_comment") {
              const body = payload.comment.body.trim();
              if (body.startsWith("/ai") || body.startsWith("@ai-agent")) {
                should_run = true;
                task = body.replace(/^\/(ai|ai-agent)\s*/i, "").trim();
                issue_number = String(payload.issue.number);
                trigger_type = "issue_comment";
                if (payload.issue.pull_request) {
                  pr_number = String(payload.issue.number);
                  trigger_type = "pr_comment";
                }
              }
            } else if (eventName === "pull_request_review_comment") {
              const body = payload.comment.body.trim();
              if (body.startsWith("/ai") || body.startsWith("@ai-agent")) {
                should_run = true;
                task = body.replace(/^\/(ai|ai-agent)\s*/i, "").trim();
                pr_number = String(payload.pull_request.number);
                trigger_type = "pr_review_comment";
              }
            } else if (eventName === "issues" && payload.action === "labeled") {
              if (payload.label.name === "ai-fix" || payload.label.name === "ai-implement") {
                should_run = true;
                task = `Fix/implement the following issue:\n\nTitle: ${payload.issue.title}\n\nDescription:\n${payload.issue.body}`;
                issue_number = String(payload.issue.number);
                trigger_type = "labeled_issue";
              }
            } else if (eventName === "issues" && payload.action === "opened") {
              if (payload.issue.title.toLowerCase().startsWith("[ai]")) {
                should_run = true;
                task = `${payload.issue.title.replace(/^\[ai\]\s*/i, "")}\n\n${payload.issue.body || ""}`;
                issue_number = String(payload.issue.number);
                trigger_type = "ai_issue";
              }
            } else if (eventName === "pull_request") {
              if (payload.action === "opened" || payload.action === "synchronize") {
                should_run = true;
                task = `Review this pull request and provide detailed feedback:\n\nTitle: ${payload.pull_request.title}\n\nDescription:\n${payload.pull_request.body || "No description"}`;
                pr_number = String(payload.pull_request.number);
                trigger_type = "pr_review";
              }
            } else if (eventName === "workflow_dispatch") {
              should_run = true;
              task = context.payload.inputs.task;
              trigger_type = "manual";
            }

            core.setOutput("should_run", String(should_run));
            core.setOutput("task", task);
            core.setOutput("issue_number", issue_number);
            core.setOutput("pr_number", pr_number);
            core.setOutput("trigger_type", trigger_type);

  # ─────────────────────────────────────────────
  # AI AGENT MAIN JOB
  # ─────────────────────────────────────────────
  run-agent:
    needs: detect-trigger
    if: needs.detect-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Install dependencies
        run: |
          pip install google-genai requests pygithub rich

      - name: 👋 Post "thinking" reaction
        if: needs.detect-trigger.outputs.issue_number != '' || needs.detect-trigger.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = "${{ needs.detect-trigger.outputs.issue_number }}" || "${{ needs.detect-trigger.outputs.pr_number }}";
            if (issue_number) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(issue_number),
                body: "🤖 **Gemma 4 Agent** is working on your request... ⚙️\n\n_I'll update this thread when done._"
              });
            }

      - name: 🤖 Run Gemma 4 Agent
        id: agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          TASK: ${{ needs.detect-trigger.outputs.task }}
          ISSUE_NUMBER: ${{ needs.detect-trigger.outputs.issue_number }}
          PR_NUMBER: ${{ needs.detect-trigger.outputs.pr_number }}
          TRIGGER_TYPE: ${{ needs.detect-trigger.outputs.trigger_type }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: python agent/agent.py

      - name: 📊 Upload agent logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs-${{ github.run_id }}
          path: agent_output/
          retention-days: 7
