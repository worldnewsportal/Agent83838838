name: 🔍 Gemma 4 — Code Review & Health Check

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9 AM
  workflow_dispatch:
    inputs:
      scope:
        description: "Scope of review"
        default: "full"
        type: choice
        options: [full, security, performance, tests]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  code-health:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install google-genai requests

      - name: 🔍 Run Code Health Analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          SCOPE: ${{ github.event.inputs.scope || 'full' }}
        run: |
          python - <<'EOF'
          import os, json, subprocess
          from pathlib import Path
          from google import genai
          from google.genai import types
          import requests

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])
          scope  = os.environ.get("SCOPE", "full")
          owner  = os.environ["REPO_OWNER"]
          repo   = os.environ["REPO_NAME"]

          # Gather code stats
          files_output = subprocess.run("find . -type f -not -path './.git/*' | head -100",
                                         shell=True, capture_output=True, text=True).stdout
          recent_commits = subprocess.run("git log --oneline -20",
                                           shell=True, capture_output=True, text=True).stdout
          
          # Sample key files
          code_samples = ""
          for ext in ["*.py", "*.ts", "*.js", "*.go", "*.rs"]:
              result = subprocess.run(f"find . -name '{ext}' -not -path './.git/*' | head -5",
                                      shell=True, capture_output=True, text=True)
              for f in result.stdout.strip().split("\n"):
                  if f and Path(f).exists():
                      content = Path(f).read_text(errors="replace")[:1500]
                      code_samples += f"\n\n--- {f} ---\n{content}"

          scope_instructions = {
              "full":        "Perform a comprehensive code review: quality, security, performance, maintainability, test coverage, and best practices.",
              "security":    "Focus exclusively on security vulnerabilities: injection attacks, auth issues, exposed secrets, insecure dependencies, data exposure.",
              "performance": "Focus on performance issues: algorithmic complexity, memory leaks, unnecessary DB calls, caching opportunities.",
              "tests":       "Analyze test coverage and quality: missing tests, flaky tests, edge cases not covered, test structure."
          }

          prompt = f"""
          Perform a {scope} code health analysis for this repository.

          Repository files:
          {files_output}

          Recent commits:
          {recent_commits}

          Code samples:
          {code_samples[:6000]}

          {scope_instructions.get(scope, scope_instructions['full'])}

          Provide a structured Markdown report with:
          1. Executive Summary (2-3 sentences)
          2. Critical Issues (must fix)
          3. Important Improvements (should fix)
          4. Nice-to-have Suggestions
          5. Positive observations (what's done well)
          6. Priority action items (numbered list)

          Be specific with file names and line references where possible.
          """

          response = client.models.generate_content(
              model="gemma-4-31b-it",
              contents=prompt,
              config=types.GenerateContentConfig(
                  thinking_config=types.ThinkingConfig(thinking_level="HIGH"),
                  max_output_tokens=4096,
                  temperature=0.1,
              )
          )

          report = response.text

          # Post as GitHub issue
          headers = {
              "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
              "Accept": "application/vnd.github+json",
          }
          from datetime import datetime
          title = f"🤖 Code Health Report ({scope.title()}) — {datetime.now().strftime('%Y-%m-%d')}"
          body  = f"{report}\n\n---\n<sub>Generated by Gemma 4 31B AI Agent</sub>"

          resp = requests.post(
              f"https://api.github.com/repos/{owner}/{repo}/issues",
              headers=headers,
              json={"title": title, "body": body, "labels": ["ai-report", "code-quality"]}
          )
          if resp.status_code == 201:
              print(f"✅ Report posted: {resp.json()['html_url']}")
          else:
              print(f"Report:\n{report}")
          EOF
